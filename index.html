<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="src/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://kit.fontawesome.com/b6aef84551.js"
      crossorigin="anonymous"
    ></script>

    <title>Ami Portfolio</title>
  </head>
  <body>
    <div class="line-vertical-left"></div>
    <div class="line-vertical-right"></div>
    <div class="container">
      <div class="nav">
        <span class="hamburger" onClick="toggleMenu()">&#9776;</span>
      </div>

      <nav class="d-flex justify-content-end nav-links" id="navLinks">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Project</a>
        <a href="#">Contact</a>
      </nav>

      <div class="line-horizontal"></div>
      <main>
        <div class="row text-md-start align-items-center">
          <div class="col-md-6">
            <p>Hello I'm</p>
            <h1>Ami Fukuyama</h1>
            <div
              class="border job-title position-relative border-1 border-dark"
            >
              <h2
                class="position-relative d-flex justify-content-center align-items-center p-2 p-md-4"
              >
                Junior Front-end Developer
              </h2>

              <span
                class="job-title-square job-title-square-top-left position-absolute top-0 start-0"
              ></span>
              <span
                class="job-title-square job-title-square-top-right position-absolute top-0 end-0"
              ></span>
              <span
                class="job-title-square job-title-square-bottom-left position-absolute bottom-0 start-0"
              ></span>
              <span
                class="job-title-square job-title-square-bottom-right position-absolute bottom-0 end-0"
              ></span>
            </div>
            <div class="icons">
              <i class="fa-brands fa-figma"></i>
              <i class="fa-vscode"></i>
              <i class="fa-brands fa-react"></i>
              <i class="fa-brands fa-bootstrap"></i>
              <i class="fa-brands fa-github"></i>
            </div>
          </div>
          <div class="col-md-2">
            <img
              src="images/font-circle.svg"
              class="circle"
              alt="font-circle"
            />
          </div>
          <div class="col-md-4">
            <img
              src="images/portfolio-photo.jpg"
              class="oval-image img-fluid"
              alt="responsive image"
            />
          </div>
        </div>
      </main>
      <div class="line-horizontal"></div>
    </div>
    <script src="src/index.js"></script>
  </body>
</html>
